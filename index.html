<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏攻略个人主页</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      color: #f6f7fb;
      background: linear-gradient(135deg, #111827 0%, #223047 45%, #25635f 100%);
      display: flex;
      flex-direction: column;
    }

    main {
      width: min(920px, 92%);
      margin: 0 auto;
      padding: 72px 0 48px;
      flex: 1;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(2.2rem, 6vw, 4.5rem);
      line-height: 1.1;
      text-align: center;
      color: #ffffff;
    }

    p {
      margin: 18px 0;
      padding: 22px 24px;
      font-size: 1.08rem;
      line-height: 1.8;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      backdrop-filter: blur(10px);
    }

    footer {
      padding: 24px;
      text-align: center;
      color: #dce7ef;
      background: rgba(5, 10, 20, 0.35);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>我的游戏攻略基地</h1>

    <p>在开始挑战高难度关卡前，先熟悉地图路线和资源刷新点。提前规划补给、撤退路线和关键交战位置，可以让你在混乱局面中更快做出判断。</p>

    <p>战斗时不要只追求输出，观察敌人的攻击前摇和技能冷却同样重要。抓住对手技能空档再反击，通常比盲目冲锋更稳定。</p>

    <p>升级装备时优先补足自己的短板。如果经常被秒杀，就先提升防御和生命值；如果通关时间太长，再考虑强化伤害和暴击属性。</p>
  </main>

  <footer>
    © 2026 我的游戏攻略个人主页 | 保持练习，稳步上分
  </footer>
</body>
</html>
